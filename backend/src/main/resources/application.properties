spring.application.name=backend

# MySQL Database 접속 설정
spring.datasource.url=jdbc:mysql://localhost:3306/syncapi?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# JPA 설정
# update: 서버를 켤 때 엔티티(자바 코드)에 변경사항이 있으면 DB 테이블을 자동으로 수정해줌
spring.jpa.hibernate.ddl-auto=update
# JPA가 대신 짜주는 SQL 쿼리문을 콘솔창에 예쁘게 출력
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
